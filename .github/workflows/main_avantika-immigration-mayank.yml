name: Build and deploy Next.js to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Debug workspace before install
        run: |
          echo "pwd=$(pwd)"
          ls -la

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Debug Next build output
        run: |
          echo "== .next root =="
          ls -la .next || true
          echo "== .next/standalone =="
          ls -la .next/standalone || true
          echo "== .next/standalone/.next =="
          ls -la .next/standalone/.next || true
          echo "== .next/standalone/public =="
          ls -la .next/standalone/public || true

      - name: Verify standalone artifact completeness
        run: |
          test -f .next/standalone/server.js
          test -d .next/standalone/.next/static
          test -d .next/standalone/public
          test -f .next/standalone/package.json
          echo "Standalone artifact verified."

      - name: Prepare deploy artifact
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -a .next/standalone/. deploy/
          echo "== deploy root =="
          ls -la deploy
          echo "== deploy .next =="
          ls -la deploy/.next

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-standalone
          path: deploy
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-standalone
          path: .

      - name: Debug downloaded artifact
        run: |
          echo "pwd=$(pwd)"
          ls -la
          test -f server.js

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DB1C2DAB61BD48888879AB8F45FDB9A8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_78CA99B523CD4605BB6D3C2F010989CA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3FBCDFFFB2514ACCB562F5A8CC512768 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'avantika-immigration-mayank'
          slot-name: 'Production'
          package: .
